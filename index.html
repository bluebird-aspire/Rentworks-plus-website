<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentWorksPlus — Car Rental Management Software | 26 Integrated Modules</title>
    <meta name="description" content="RentWorksPlus is a cloud-based car rental management platform with 26 integrated modules for reservations, fleet management, payments, claims, and customer relationships." />
    <link rel="canonical" href="https://www.rentworksplus.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="RentWorksPlus — Car Rental Management Software" />
    <meta property="og:description" content="Cloud-based platform with 26 integrated modules for modern rental operations. Reservations, fleet, payments, claims, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rentworksplus.com/" />
    <meta property="og:site_name" content="RentWorksPlus" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RentWorksPlus — Car Rental Management Software" />
    <meta name="twitter:description" content="Cloud-based platform with 26 integrated modules for modern rental operations." />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RentWorksPlus",
      "alternateName": "Bluebird Auto Rental Systems",
      "url": "https://www.rentworksplus.com",
      "description": "Cloud-based car rental management platform with 26 integrated modules for reservations, fleet management, payments, claims, and customer relationships.",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "telephone": "+1-973-989-2423",
          "email": "support@barsnet.com",
          "contactType": "customer support",
          "availableLanguage": "English"
        }
      ]
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RentWorksPlus",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "Car Rental Management Software",
      "operatingSystem": "Web (Cloud-based)",
      "description": "Multi-tenant car rental management platform with 26 integrated modules covering the full rental lifecycle — reservations, fleet management, multi-gateway payments, claims, customer profiles, vehicle inspection, analytics, and more.",
      "url": "https://www.rentworksplus.com",
      "featureList": [
        "Full rental lifecycle management",
        "Fleet management with ACRISS classification",
        "Multi-gateway payments (Adyen, Worldpay, TriPOS, CenPOS)",
        "Customer 360° profiles with OCR license scanning",
        "Photo-based vehicle inspection (60+ zones)",
        "Claims management with 9 detail tabs",
        "Visual form builder with conditional logic",
        "Analytics dashboard with 15+ KPIs",
        "Multi-location enterprise configuration",
        "Customer loyalty programs"
      ],
      "offers": {
        "@type": "Offer",
        "category": "SaaS",
        "availability": "https://schema.org/OnlineOnly"
      },
      "author": {
        "@type": "Organization",
        "name": "Bluebird Auto Rental Systems"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RentWorksPlus",
      "url": "https://www.rentworksplus.com",
      "description": "Cloud-based car rental management platform with 26 integrated modules.",
      "publisher": {
        "@type": "Organization",
        "name": "RentWorksPlus"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
