        <h1>RentWorksPlus — Car Rental Management Software</h1>
        <p>RentWorksPlus is a cloud-based car rental management platform built by Bluebird Auto Rental Systems. It provides 26 integrated modules covering the full rental lifecycle — from reservations and check-in through vehicle inspection, payment processing, and check-out. Designed for car rental agencies, dealerships, and fleet operators, RentWorksPlus consolidates operations into a single multi-tenant platform with role-based access control and multi-location support.</p>

        <h2>What Does RentWorksPlus Include?</h2>
        <p>The platform includes reservation management with conflict detection, fleet management with ACRISS vehicle classification, 360-degree customer profiles with OCR license scanning, and payment processing with Adyen gateway integration. Additional modules cover claims management with nine detail tabs, a visual drag-and-drop form builder with conditional logic, photo-based vehicle inspection across 60+ zones, a real-time analytics dashboard with 15+ KPIs, customer loyalty programs, lost and found tracking, and built-in interactive training guides.</p>

        <h2>How Does Payment Processing Work?</h2>
        <p>RentWorksPlus integrates with Adyen for payment processing, plus hosted payment solutions and direct billing. The system handles real-time payment status tracking, error recovery, and multiple payment methods per transaction. Operators can configure payment settings per location for maximum flexibility.</p>

        <h2>How Does the Digital Vehicle Inspection Work?</h2>
        <p>The inspection system uses photo-based documentation across 60+ mapped vehicle zones. Staff mark damage directly on visual vehicle diagrams, classify damage types (scratch, dent, crack, stain, chip, tear, rust, missing, broken), and attach photos. A customer self-service inspection option allows renters to document vehicle condition independently before and after rental.</p>
